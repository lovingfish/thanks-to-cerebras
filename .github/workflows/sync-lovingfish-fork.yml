name: sync-lovingfish-fork

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: sync-lovingfish-fork
  cancel-in-progress: false

jobs:
  sync:
    if: github.repository == 'makoMakoGo/thanks-to-cerebras'
    runs-on: ubuntu-latest
    steps:
      - name: Sync lovingfish fork main
        env:
          GH_TOKEN: ${{ secrets.LOVINGFISH_FORK_SYNC_TOKEN }}
        run: |
          if [ -z "${GH_TOKEN}" ]; then
            echo "LOVINGFISH_FORK_SYNC_TOKEN is not configured" >&2
            exit 1
          fi

          curl --fail-with-body --silent --show-error -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/lovingfish/thanks-to-cerebras/merge-upstream \
            -d '{"branch":"main"}'
